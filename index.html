<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>∫CALCLE — Calculus Wordle</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toast"></div>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header>
    <div class="logo">∫CALC<span>LE</span></div>
    <div class="tagline">A calculus puzzle for the mathematically inclined</div>

    <!-- Row 1: Mode + Course -->
    <div class="bar-row" style="margin-top:16px;">
      <span class="bar-label">Mode</span>
      <button class="pill-btn active" id="btn-daily"   onclick="setMode('daily')">📅 Daily</button>
      <button class="pill-btn"        id="btn-endless" onclick="setMode('endless')">∞ Endless</button>
      <div class="bar-divider"></div>
      <span class="bar-label">Course</span>
      <button class="pill-btn active" id="btn-calc1" onclick="setCalc('calc1')">Calc I</button>
      <button class="pill-btn"        id="btn-calc2" onclick="setCalc('calc2')">Calc II</button>
    </div>

    <!-- Row 2: Topics (rendered dynamically by JS) -->
    <div class="bar-row" id="topic-bar"></div>

    <!-- Stats -->
    <div class="status-bar">
      <div class="stat">
        <span class="stat-val" id="stat-streak">0</span>
        <span>streak</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-score">0</span>
        <span>score</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-wins">0</span>
        <span>wins</span>
      </div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main>

    <!-- Endless mode progress bar -->
    <div id="endless-info" style="display:none; width:100%; max-width:500px;">
      <div class="round-info" id="round-info-text">Round 1 · Easy (1/5)</div>
      <div class="progress-bar" style="margin-top:6px;">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Question card -->
    <div class="question-card" id="question-card">
      <div class="question-meta">
        <span class="question-label">Evaluate / Identify</span>
        <span class="topic-tag" id="topic-tag"></span>
      </div>

      <!-- Loading spinner (shown while AI generates) -->
      <div class="loading-state" id="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">Generating question…</div>
      </div>

      <!-- Question body (shown after load) -->
      <div id="question-body" style="display:none; width:100%;">
        <div class="question-text" id="question-text"></div>
        <div id="diff-badge"></div>
        <div class="ai-badge" id="ai-badge">
          <div class="ai-dot static" id="ai-dot"></div>
          <span id="ai-label">AI Generated</span>
        </div>
      </div>
    </div>

    <!-- Error banner (clickable to retry) -->
    <div class="error-banner" id="error-banner"></div>

    <!-- Answer choices -->
    <div class="choices-grid" id="choices-grid" style="display:none;"></div>

    <!-- End card (shown after answering) -->
    <div class="end-card" id="end-card">
      <h2 id="end-title"></h2>
      <div class="answer-reveal">The answer was</div>
      <div class="correct-answer" id="end-answer"></div>
      <div class="explanation" id="end-explanation"></div>

      <!-- Solution toggle -->
      <button class="solution-toggle" id="solution-toggle" onclick="toggleSolution()">
        <span class="toggle-arrow">▾</span>
        <span id="solution-toggle-label">Show Full Solution</span>
      </button>

      <!-- Expandable step-by-step solution panel -->
      <div class="solution-panel" id="solution-panel">
        <div class="solution-header">
          <span>✦</span> Step-by-Step Solution
        </div>
        <div class="solution-body" id="solution-body">
          <div class="solution-loading" id="solution-loading">
            <div class="mini-spin"></div>
            Generating solution…
          </div>
        </div>
      </div>

      <button class="next-btn" id="next-btn">Next Question →</button>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
